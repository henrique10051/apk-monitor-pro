name: Build Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pyinstaller
    
    - name: Download Platform Tools (ADB)
      run: |
        Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile "platform-tools.zip"
        Expand-Archive -Path "platform-tools.zip" -DestinationPath "."
    
    - name: Build Windows EXE with ADB
      run: |
        pyinstaller --name=APKMonitorPro --onefile --clean --noconfirm --hidden-import=apk_monitor_pro.core.adb_manager --hidden-import=apk_monitor_pro.analyzers.error_diagnostics --hidden-import=apk_monitor_pro.integrations.frida_hook --hidden-import=apk_monitor_pro.integrations.tcpdump_capture --hidden-import=apk_monitor_pro.utils.report_generator --add-data="apk_monitor_pro;apk_monitor_pro" --add-binary="platform-tools/adb.exe;adb" --add-binary="platform-tools/AdbWinApi.dll;adb" --add-binary="platform-tools/AdbWinUsbApi.dll;adb" apk_monitor_pro.py
    
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: APKMonitorPro-Windows
        path: dist/APKMonitorPro.exe

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pyinstaller
    
    - name: Build macOS APP
      run: |
        pyinstaller --name=APKMonitorPro --windowed --onefile --clean --noconfirm --hidden-import=apk_monitor_pro.core.adb_manager --hidden-import=apk_monitor_pro.analyzers.error_diagnostics --hidden-import=apk_monitor_pro.integrations.frida_hook --hidden-import=apk_monitor_pro.integrations.tcpdump_capture --hidden-import=apk_monitor_pro.utils.report_generator --add-data="apk_monitor_pro:apk_monitor_pro" apk_monitor_pro.py
    
    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: APKMonitorPro-macOS
        path: dist/APKMonitorPro.app
