name: Build Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pyinstaller
    
    - name: Build Windows EXE
      run: |
        pyinstaller --name=APKMonitorPro --onefile --clean --noconfirm --hidden-import=apk_monitor_pro.core.adb_manager --hidden-import=apk_monitor_pro.analyzers.error_diagnostics --hidden-import=apk_monitor_pro.integrations.frida_hook --hidden-import=apk_monitor_pro.integrations.tcpdump_capture --hidden-import=apk_monitor_pro.utils.report_generator --add-data="apk_monitor_pro;apk_monitor_pro" apk_monitor_pro.py
    
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v3
      with:
        name: APKMonitorPro-Windows
        path: dist/APKMonitorPro.exe
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pyinstaller
    
    - name: Build macOS APP
      run: |
        pyinstaller --name=APKMonitorPro --windowed --onefile --clean --noconfirm --hidden-import=apk_monitor_pro.core.adb_manager --hidden-import=apk_monitor_pro.analyzers.error_diagnostics --hidden-import=apk_monitor_pro.integrations.frida_hook --hidden-import=apk_monitor_pro.integrations.tcpdump_capture --hidden-import=apk_monitor_pro.utils.report_generator --add-data="apk_monitor_pro:apk_monitor_pro" apk_monitor_pro.py
    
    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v3
      with:
        name: APKMonitorPro-macOS
        path: dist/APKMonitorPro.app
        retention-days: 30
