name: Build Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pyinstaller
    
    - name: Download Platform Tools (ADB)
      run: |
        Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile "platform-tools.zip"
        Expand-Archive -Path "platform-tools.zip" -DestinationPath "."
        Remove-Item "platform-tools.zip"
    
    - name: Build Windows EXE with Embedded ADB
      run: |
        # Lista arquivos do platform-tools para debug
        Get-ChildItem platform-tools
        
        # Build com caminhos absolutos
        $currentPath = Get-Location
        pyinstaller --name=APKMonitorPro --onefile --clean --noconfirm --hidden-import=apk_monitor_pro.core.adb_manager --hidden-import=apk_monitor_pro.analyzers.error_diagnostics --hidden-import=apk_monitor_pro.integrations.frida_hook --hidden-import=apk_monitor_pro.integrations.tcpdump_capture --hidden-import=apk_monitor_pro.utils.report_generator --add-data="apk_monitor_pro;apk_monitor_pro" --add-binary="$currentPath\platform-tools\adb.exe;adb" --add-binary="$currentPath\platform-tools\AdbWinApi.dll;adb" --add-binary="$currentPath\platform-tools\AdbWinUsbApi.dll;adb" apk_monitor_pro.py
        
        # Verifica tamanho do executável
        Get-Item dist\APKMonitorPro.exe | Select-Object Name, Length
    
    - name: Create Portable Package
      run: |
        # Cria estrutura portátil
        New-Item -ItemType Directory -Path "dist/APK_Monitor_Portable" -Force
        New-Item -ItemType Directory -Path "dist/APK_Monitor_Portable/adb" -Force
        
        # Copia executável
        Copy-Item "dist/APKMonitorPro.exe" "dist/APK_Monitor_Portable/"
        
        # Copia ADB
        Copy-Item "platform-tools/adb.exe" "dist/APK_Monitor_Portable/adb/"
        Copy-Item "platform-tools/AdbWinApi.dll" "dist/APK_Monitor_Portable/adb/"
        Copy-Item "platform-tools/AdbWinUsbApi.dll" "dist/APK_Monitor_Portable/adb/"
        
        # Cria script .bat
        @"
        @echo off
        title APK Monitor Pro
        set CURRENT_DIR=%~dp0
        
        cls
        echo ================================================
        echo    APK MONITOR PRO - VERSAO PORTATIL
        echo ================================================
        echo.
        
        if exist "%CURRENT_DIR%adb\adb.exe" (
            echo [OK] ADB encontrado
            set PATH=%PATH%;%CURRENT_DIR%adb
        )
        
        echo [OK] Iniciando APK Monitor Pro...
        echo.
        start "" "%CURRENT_DIR%APKMonitorPro.exe"
        
        timeout /t 2 /nobreak >nul
        echo [OK] Programa iniciado!
        echo Pode fechar esta janela.
        timeout /t 3 /nobreak >nul
        "@ | Out-File -FilePath "dist/APK_Monitor_Portable/Start_APK_Monitor.bat" -Encoding ASCII
        
        # Cria README
        @"
        APK MONITOR PRO - VERSAO PORTATIL
        ===================================
        
        COMO USAR:
        1. Conecte seu dispositivo Android via USB
        2. Execute "Start_APK_Monitor.bat"
        3. Pronto!
        
        NAO PRECISA:
        - Permissoes de administrador
        - Instalar ADB separadamente
        - Configurar variaveis de ambiente
        
        CONTEUDO:
        - Start_APK_Monitor.bat (Execute este)
        - APKMonitorPro.exe (Programa principal)
        - adb/ (Android Debug Bridge)
        
        Copyright 2024
        "@ | Out-File -FilePath "dist/APK_Monitor_Portable/README.txt" -Encoding UTF8
        
        # Cria ZIP
        Compress-Archive -Path "dist/APK_Monitor_Portable/*" -DestinationPath "dist/APK_Monitor_Pro_Portable.zip" -Force
    
    - name: Upload Windows EXE with Embedded ADB
      uses: actions/upload-artifact@v4
      with:
        name: APKMonitorPro-Windows-WithADB
        path: dist/APKMonitorPro.exe
    
    - name: Upload Portable Package (ZIP)
      uses: actions/upload-artifact@v4
      with:
        name: APKMonitorPro-Windows-Portable-ZIP
        path: dist/APK_Monitor_Pro_Portable.zip

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 pyinstaller
    
    - name: Build macOS APP
      run: |
        pyinstaller --name=APKMonitorPro --windowed --onefile --clean --noconfirm --hidden-import=apk_monitor_pro.core.adb_manager --hidden-import=apk_monitor_pro.analyzers.error_diagnostics --hidden-import=apk_monitor_pro.integrations.frida_hook --hidden-import=apk_monitor_pro.integrations.tcpdump_capture --hidden-import=apk_monitor_pro.utils.report_generator --add-data="apk_monitor_pro:apk_monitor_pro" apk_monitor_pro.py
    
    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: APKMonitorPro-macOS
        path: dist/APKMonitorPro.app
